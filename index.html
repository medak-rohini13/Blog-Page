<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Blog Page</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f6f9;
            padding: 30px;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 34px;
            color: #1f1f1f;
        }

        .header p {
            color: #666;
        }

        /* FORM */
        .form-container {
            max-width: 700px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        input,
        textarea {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: #1558b0;
        }

        /* BLOG */
        .blog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            color: #1a73e8;
        }

        .meta {
            font-size: 12px;
            color: #777;
            margin: 6px 0;
        }

        .desc {
            font-size: 14px;
            color: #444;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>My Dynamic Blog</h1>
        <p>Add posts instantly using JavaScript 🚀</p>
    </div>

    <!-- FORM -->
    <div class="form-container">
        <input type="text" id="title" placeholder="Post Title">
        <input type="text" id="author" placeholder="Author Name">
        <textarea id="desc" placeholder="Write your post..."></textarea>
        <button onclick="addPost()">Add Post</button>
    </div>

    <!-- BLOG POSTS -->
    <div class="blog-container" id="blogContainer"></div>

    <script>
        const blogContainer = document.getElementById("blogContainer");

        /* Initial posts */
        let posts = [
            {
                title: "Welcome to My Blog",
                author: "Admin",
                desc: "This is a dynamic blog where posts are added using JavaScript.",
                date: new Date().toLocaleDateString()
            }
        ];

        /* Render posts */
        function renderPosts() {
            blogContainer.innerHTML = "";

            posts.forEach(post => {
                blogContainer.innerHTML += `
      <div class="card">
        <div class="title">${post.title}</div>
        <div class="meta">By ${post.author} • ${post.date}</div>
        <div class="desc">${post.desc}</div>
      </div>
    `;
            });
        }

        /* Add post */
        function addPost() {
            const title = document.getElementById("title").value;
            const author = document.getElementById("author").value;
            const desc = document.getElementById("desc").value;

            if (!title || !author || !desc) {
                alert("Please fill all fields");
                return;
            }

            const newPost = {
                title,
                author,
                desc,
                date: new Date().toLocaleDateString()
            };

            posts.unshift(newPost); // add at top
            renderPosts();

            document.getElementById("title").value = "";
            document.getElementById("author").value = "";
            document.getElementById("desc").value = "";
        }

        /* initial render */
        renderPosts();
    </script>

</body>

</html>
